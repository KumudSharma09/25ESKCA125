<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Confirmation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="header text-center text-white p-4 rounded mb-4">
        <h2>
            <i class="fa-solid fa-user-graduate"></i>
            Student Registration Confirmation System
        </h2>
        <p class="mb-0">Fill in your details below</p>
    </div>

    <!-- Form Card -->
    <div class="card shadow-lg">
        <div class="card-body">

            <form action="day 8 registration.php" method="POST" enctype="multipart/form-data">

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter your name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" name="phoneNumber" placeholder="Enter your phone number" required>
                </div>

                <!-- Student Photo -->
                <div class="mb-3">
                    <label class="form-label">Student Photo</label>
                    <input type="file" class="form-control" name="photo">
                </div>

                <!-- Gender -->
                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <br>

                    <input type="radio" name="gender" value="Male" required>
                    Male

                    &nbsp;&nbsp;

                    <input type="radio" name="gender" value="Female">
                    Female

                    &nbsp;&nbsp;

                    <input type="radio" name="gender" value="Other">
                    Other
                </div>

                <!-- Course -->
                <div class="mb-3">
                    <label class="form-label">Course</label>

                    <select class="form-select" name="course" required>
                        <option value="">Select Course</option>
                        <option>B.Tech AI</option>
                        <option>B.Tech CSE</option>
                        <option>B.Tech IT</option>
                        <option>B.Tech ECE</option>
                    </select>
                </div>

                <!-- Address -->
                <div class="mb-3">
                    <label class="form-label">Address</label>

                    <textarea class="form-control"
                    name="address"
                    rows="4"
                    placeholder="Enter your address"
                    required></textarea>
                </div>

                <!-- Submit -->
                <button class="btn btn-success w-100">
                    <i class="fa-solid fa-paper-plane"></i>
                    Register
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
