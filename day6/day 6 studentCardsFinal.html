<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<script src="http://code.jquery.com/jquery-3.2.1.min.js"></script>
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <h2 class="text-center mb-4">Student Records</h2>
            <input type="text" id="search" class="forms-control mb-4" placeholder="Search Student">
            <div id ="container" class="row g-4"></div>
        </div>
        <script>
            const students=[
                {name:"kumud",branch:"AI",CGPA:"7.2"},
                {name:"kK",branch:"AI",CGPA:"9" },
                {name:"khushi",branch:"AI",CGPA:9.1},
                {name:"bhati",branch:"AI",CGPA:6.5},
                {name:"khajuria",branch:"AI",CGPA:6.6}
            ]
            let html="";
            for(let i=0; i<students.length;i++){
                html +=
                `<div class="col-md-4 card-item">
                    <div class="card-shadow">
                        <div class="card-body">
                            <h4> ${students[i].name}</h4> 
                            <button class= "btn btn-primary btn-sm mt-2">
                                Show Details
                                </button>
                                <div class="details mt-3" style="display:none;">
                                    <p><strong>Branch:</strong> ${students[i].branch}</p>
                                    <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                                    </div>
                                    </div></div></div>`;
                                    

            }
            document.getElementById("container").innerHTML=html;
            $(document).on("click",".btn",function(){
                $(this).next(".details").slideToggle();
                
            });

        </script>
    </body>

    </head>
</html>
